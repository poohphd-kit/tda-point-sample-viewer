<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TDA 3D Point Cloud Viewer</title>
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0f172a; color: #e5e7eb; }
    #app { display: grid; grid-template-columns: 250px 1fr; width: 100vw; height: 100vh; }
    aside { padding: 12px; background: #111827; border-right: 1px solid #374151; overflow-y: auto; }
    main { position: relative; min-width: 0; min-height: 0; }
    h1 { font-size: 15px; margin: 0 0 8px; line-height: 1.25; }
    .sub { color: #9ca3af; font-size: 11px; line-height: 1.35; margin-bottom: 10px; }
    .group { border: 1px solid #374151; background: #1f2937; border-radius: 10px; padding: 10px; margin-bottom: 10px; }
    .group h2 { font-size: 12px; margin: 0 0 8px; }
    label { display: block; font-size: 11px; color: #9ca3af; margin: 8px 0 4px; }
    input, button { width: 100%; }
    input[type="number"] { padding: 7px 8px; border-radius: 7px; border: 1px solid #374151; background: #020617; color: #e5e7eb; font-size: 14px; }
    input[type="color"] { height: 30px; border: 1px solid #374151; border-radius: 7px; background: #020617; padding: 3px; }
    input[type="range"] { accent-color: #38bdf8; }
    button { cursor: pointer; border: 1px solid #0284c7; background: linear-gradient(180deg, #0ea5e9, #0369a1); color: white; padding: 8px 10px; border-radius: 8px; font-weight: 700; margin-top: 8px; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .check { display: flex; align-items: center; gap: 7px; margin-top: 6px; font-size: 12px; }
    .check input { width: auto; }
    .value { font-size: 11px; color: #9ca3af; text-align: right; }
    #viewer { position: absolute; inset: 0; }
    #message { position: absolute; left: 12px; bottom: 12px; max-width: min(520px, calc(100% - 24px)); background: rgba(2,6,23,.82); border: 1px solid #374151; border-radius: 10px; padding: 8px 10px; font-size: 12px; white-space: pre-wrap; }
    .stats { font-size: 10px; color: #9ca3af; line-height: 1.45; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; word-break: break-word; }
    @media (max-width: 760px) {
      #app { grid-template-columns: 1fr; grid-template-rows: auto 1fr; }
      aside { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 8px; border-right: none; border-bottom: 1px solid #374151; max-height: 44vh; }
      h1, .sub { grid-column: 1 / -1; }
      .group { margin-bottom: 0; }
    }
  </style>
</head>
<body>
  <div id="app">
    <aside>
      <h1>TDA 3D Point Cloud Viewer</h1>
      <div class="sub">点群を生成して表示します。ドラッグで回転、ホイールでズーム。</div>

      <section class="group">
        <label for="sampleCount">点の数</label>
        <input id="sampleCount" type="number" min="1" step="1" value="100" />
        <button id="generateSample">サンプル生成</button>
      </section>

      <section class="group">
        <h2>表示</h2>
        <div class="check"><input id="showPoints" type="checkbox" checked><span>点群</span></div>
        <div class="check"><input id="showSpheres" type="checkbox" checked><span>球体</span></div>
        <label for="radius">球体半径</label>
        <input id="radius" type="range" min="0" max="0.5" step="0.005" value="0.08" />
        <div id="radiusValue" class="value">0.080</div>
        <div class="row">
          <div><label for="pointColor">点</label><input id="pointColor" type="color" value="#38bdf8" /></div>
          <div><label for="sphereColor">球</label><input id="sphereColor" type="color" value="#22c55e" /></div>
        </div>
        <label for="opacity">透明度</label>
        <input id="opacity" type="range" min="0" max="1" step="0.01" value="0.32" />
        <div id="opacityValue" class="value">0.32</div>
      </section>

      <section class="group">
        <h2>情報</h2>
        <div id="stats" class="stats">未生成</div>
      </section>
    </aside>

    <main>
      <div id="viewer"></div>
      <div id="message">サンプル点数を指定して生成してください。</div>
    </main>
  </div>

  <script type="module">
    import * as THREE from "three";
    import { OrbitControls } from "three/addons/controls/OrbitControls.js";

    const viewer = document.getElementById("viewer");
    const message = document.getElementById("message");
    const stats = document.getElementById("stats");

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0f172a);

    const camera = new THREE.PerspectiveCamera(50, 1, 0.01, 100);
    camera.position.set(2.6, 2.1, 2.8);

    const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    viewer.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;

    scene.add(new THREE.AmbientLight(0xffffff, 0.75));
    const light = new THREE.DirectionalLight(0xffffff, 1.0);
    light.position.set(4, 6, 5);
    scene.add(light);
    scene.add(new THREE.AxesHelper(1.25));

    let rawPoints = [];
    let normalizedPoints = [];
    const pointGroup = new THREE.Group();
    const sphereGroup = new THREE.Group();
    scene.add(pointGroup, sphereGroup);

    const els = {
      sampleCount: document.getElementById("sampleCount"),
      generateSample: document.getElementById("generateSample"),
      showPoints: document.getElementById("showPoints"),
      showSpheres: document.getElementById("showSpheres"),
      radius: document.getElementById("radius"),
      radiusValue: document.getElementById("radiusValue"),
      pointColor: document.getElementById("pointColor"),
      sphereColor: document.getElementById("sphereColor"),
      opacity: document.getElementById("opacity"),
      opacityValue: document.getElementById("opacityValue")
    };

    function setMessage(text) { message.textContent = text; }

    function validateCount() {
      const n = Number(els.sampleCount.value);
      if (!Number.isInteger(n) || n < 1) throw new Error("点の数には1以上の整数を入力してください。");
      if (n > 5000) throw new Error("点数は5000以下を推奨します。");
      return n;
    }

    function generatePoints(n) {
      return Array.from({ length: n }, () => ({
        x: Math.random() * 200 - 100,
        y: Math.random() * 200 - 100,
        z: Math.random() * 200 - 100
      }));
    }

    function normalize(points) {
      const maxAbs = Math.max(1e-12, ...points.flatMap(p => [Math.abs(p.x), Math.abs(p.y), Math.abs(p.z)]));
      return points.map(p => ({ x: p.x / maxAbs, y: p.y / maxAbs, z: p.z / maxAbs }));
    }

    function clearGroup(group) {
      while (group.children.length) {
        const child = group.children.pop();
        child.geometry?.dispose();
        if (Array.isArray(child.material)) child.material.forEach(m => m.dispose());
        else child.material?.dispose();
      }
    }

    function renderPointCloud() {
      clearGroup(pointGroup);
      clearGroup(sphereGroup);

      const radius = Number(els.radius.value);
      const pointColor = new THREE.Color(els.pointColor.value);
      const sphereColor = new THREE.Color(els.sphereColor.value);
      const opacity = Number(els.opacity.value);

      els.radiusValue.textContent = radius.toFixed(3);
      els.opacityValue.textContent = opacity.toFixed(2);

      const pointGeom = new THREE.SphereGeometry(0.025, 16, 16);
      const sphereGeom = new THREE.SphereGeometry(Math.max(radius, 0.0001), 32, 16);

      for (const p of normalizedPoints) {
        const point = new THREE.Mesh(pointGeom, new THREE.MeshStandardMaterial({ color: pointColor, roughness: 0.45 }));
        point.position.set(p.x, p.y, p.z);
        pointGroup.add(point);

        const sphere = new THREE.Mesh(
          sphereGeom,
          new THREE.MeshStandardMaterial({ color: sphereColor, transparent: true, opacity, roughness: 0.4, depthWrite: false })
        );
        sphere.position.set(p.x, p.y, p.z);
        sphereGroup.add(sphere);
      }

      pointGroup.visible = els.showPoints.checked;
      sphereGroup.visible = els.showSpheres.checked;
      updateStats();
    }

    function updateStats() {
      if (!rawPoints.length) { stats.textContent = "未生成"; return; }
      const xs = rawPoints.map(p => p.x), ys = rawPoints.map(p => p.y), zs = rawPoints.map(p => p.z);
      const min = a => Math.min(...a).toFixed(2);
      const max = a => Math.max(...a).toFixed(2);
      const maxAbs = Math.max(...rawPoints.flatMap(p => [Math.abs(p.x), Math.abs(p.y), Math.abs(p.z)])).toFixed(2);
      stats.textContent = `points: ${rawPoints.length}\nx: ${min(xs)} to ${max(xs)}\ny: ${min(ys)} to ${max(ys)}\nz: ${min(zs)} to ${max(zs)}\nmaxAbs: ${maxAbs}`;
    }

    function resetCamera() {
      camera.position.set(2.6, 2.1, 2.8);
      controls.target.set(0, 0, 0);
      controls.update();
    }

    function generateAndDraw() {
      try {
        const n = validateCount();
        rawPoints = generatePoints(n);
        normalizedPoints = normalize(rawPoints);
        renderPointCloud();
        resetCamera();
        setMessage(`${n}点のサンプル点群を生成しました。`);
      } catch (e) {
        setMessage(e.message);
      }
    }

    function runSelfTests() {
      console.assert(generatePoints(3).length === 3, "generatePoints should create requested number of points");
      console.assert(normalize([{ x: 2, y: 0, z: -4 }])[0].z === -1, "normalize should divide by max absolute coordinate");
      console.assert(!document.getElementById("csvFile"), "CSV loading UI should not exist");
      console.assert(!document.getElementById("downloadCsv"), "CSV download button should not exist");
    }

    els.generateSample.addEventListener("click", generateAndDraw);
    [els.showPoints, els.showSpheres].forEach(el => el.addEventListener("change", () => {
      pointGroup.visible = els.showPoints.checked;
      sphereGroup.visible = els.showSpheres.checked;
    }));
    [els.radius, els.pointColor, els.sphereColor, els.opacity].forEach(el => el.addEventListener("input", renderPointCloud));

    function resize() {
      const w = viewer.clientWidth;
      const h = viewer.clientHeight;
      if (w <= 0 || h <= 0) return;
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
      renderer.setSize(w, h);
    }
    window.addEventListener("resize", resize);
    resize();

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }

    runSelfTests();
    animate();
    generateAndDraw();
  </script>
</body>
</html>
