<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TDA 3D Point Cloud Viewer</title>
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #ffffff;
      color: #111827;
    }
    #app {
      display: grid;
      grid-template-columns: 230px 1fr;
      gap: 12px;
      width: 100vw;
      height: 100vh;
      padding: 12px;
      background: #ffffff;
    }
    aside {
      background: #ffffff;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      padding: 12px;
      overflow-y: auto;
    }
    main {
      position: relative;
      min-width: 0;
      min-height: 0;
      background: #ffffff;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      overflow: hidden;
    }
    h1 {
      font-size: 15px;
      margin: 0 0 8px;
      line-height: 1.25;
      color: #111827;
    }
    .sub {
      color: #6b7280;
      font-size: 11px;
      line-height: 1.35;
      margin-bottom: 12px;
    }
    .panel {
      display: grid;
      gap: 8px;
    }
    label {
      display: block;
      font-size: 11px;
      color: #4b5563;
      margin: 4px 0 3px;
    }
    input, button { width: 100%; }
    input[type="number"] {
      padding: 7px 8px;
      border-radius: 7px;
      border: 1px solid #cbd5e1;
      background: #ffffff;
      color: #111827;
      font-size: 14px;
    }
    input[type="color"] {
      height: 30px;
      border: 1px solid #cbd5e1;
      border-radius: 7px;
      background: #ffffff;
      padding: 3px;
    }
    input[type="range"] { accent-color: #2563eb; }
    button {
      cursor: pointer;
      border: 1px solid #2563eb;
      background: #2563eb;
      color: #ffffff;
      padding: 8px 10px;
      border-radius: 8px;
      font-weight: 700;
      margin: 2px 0 6px;
    }
    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .value {
      font-size: 11px;
      color: #6b7280;
      text-align: right;
      margin-top: -4px;
    }
    #viewer {
      position: absolute;
      inset: 0;
      background: #ffffff;
    }
    @media (max-width: 760px) {
      html, body { overflow: auto; }
      #app {
        grid-template-columns: 1fr;
        grid-template-rows: 62vh auto;
        height: auto;
        min-height: 100vh;
      }
      main { min-height: 62vh; grid-row: 1; }
      aside { grid-row: 2; }
    }
  </style>
</head>
<body>
  <div id="app">
    <aside>
      <h1>TDA 3D Point Cloud Viewer</h1>
      <div class="sub">点群を生成して表示します。半径が大きくなると近い点を線で結び、閉路候補を赤で強調します。</div>

      <div class="panel">
        <label for="sampleCount">点の数</label>
        <input id="sampleCount" type="number" min="1" step="1" value="100" />
        <button id="generateSample">サンプル生成</button>

        <label for="radius">球体半径</label>
        <input id="radius" type="range" min="0" max="0.5" step="0.005" value="0.18" />
        <div id="radiusValue" class="value">0.180</div>

        <div class="row">
          <div>
            <label for="pointColor">点群色</label>
            <input id="pointColor" type="color" value="#2563eb" />
          </div>
          <div>
            <label for="sphereColor">球体色</label>
            <input id="sphereColor" type="color" value="#22c55e" />
          </div>
        </div>

        <label for="opacity">球体透明度</label>
        <input id="opacity" type="range" min="0" max="1" step="0.01" value="0.32" />
        <div id="opacityValue" class="value">0.32</div>
      </div>
    </aside>

    <main>
      <div id="viewer"></div>
    </main>
  </div>

  <script type="module">
    import * as THREE from "three";
    import { OrbitControls } from "three/addons/controls/OrbitControls.js";

    const viewer = document.getElementById("viewer");

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xffffff);

    const camera = new THREE.PerspectiveCamera(50, 1, 0.01, 100);
    camera.position.set(2.6, 2.1, 2.8);

    const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
    renderer.setClearColor(0xffffff, 1);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    viewer.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;

    scene.add(new THREE.AmbientLight(0xffffff, 0.85));
    const light = new THREE.DirectionalLight(0xffffff, 1.0);
    light.position.set(4, 6, 5);
    scene.add(light);
    // Custom thick axes
function createThickAxes(length = 1.5, radius = 0.02) {
  const axesGroup = new THREE.Group();

  const createAxis = (dir, color) => {
    const material = new THREE.MeshBasicMaterial({ color });

    const cyl = new THREE.Mesh(
      new THREE.CylinderGeometry(radius, radius, length, 16),
      material
    );

    const cone = new THREE.Mesh(
      new THREE.ConeGeometry(radius * 2, 0.15, 16),
      material
    );

    if (dir === 'x') {
      cyl.rotation.z = -Math.PI / 2;
      cyl.position.x = length / 2;
      cone.rotation.z = -Math.PI / 2;
      cone.position.x = length;
    } else if (dir === 'y') {
      cyl.position.y = length / 2;
      cone.position.y = length;
    } else if (dir === 'z') {
      cyl.rotation.x = Math.PI / 2;
      cyl.position.z = length / 2;
      cone.rotation.x = Math.PI / 2;
      cone.position.z = length;
    }

    axesGroup.add(cyl);
    axesGroup.add(cone);
  };

  createAxis('x', 0xff0000);
  createAxis('y', 0x00aa00);
  createAxis('z', 0x0000ff);

  return axesGroup;
}

scene.add(createThickAxes());

    let rawPoints = [];
    let normalizedPoints = [];
    const pointGroup = new THREE.Group();
    const sphereGroup = new THREE.Group();
    const edgeGroup = new THREE.Group();
    const cycleGroup = new THREE.Group();
    scene.add(edgeGroup, cycleGroup, sphereGroup, pointGroup);

    const els = {
      sampleCount: document.getElementById("sampleCount"),
      generateSample: document.getElementById("generateSample"),
      radius: document.getElementById("radius"),
      radiusValue: document.getElementById("radiusValue"),
      pointColor: document.getElementById("pointColor"),
      sphereColor: document.getElementById("sphereColor"),
      opacity: document.getElementById("opacity"),
      opacityValue: document.getElementById("opacityValue")
    };

    function validateCount() {
      const n = Number(els.sampleCount.value);
      if (!Number.isInteger(n) || n < 1) throw new Error("点の数には1以上の整数を入力してください。");
      if (n > 5000) throw new Error("点数は5000以下を推奨します。");
      return n;
    }

    function generatePoints(n) {
      return Array.from({ length: n }, () => ({
        x: Math.random() * 200 - 100,
        y: Math.random() * 200 - 100,
        z: Math.random() * 200 - 100
      }));
    }

    function normalize(points) {
      const maxAbs = Math.max(1e-12, ...points.flatMap(p => [Math.abs(p.x), Math.abs(p.y), Math.abs(p.z)]));
      return points.map(p => ({ x: p.x / maxAbs, y: p.y / maxAbs, z: p.z / maxAbs }));
    }

    function distance(a, b) {
      const dx = a.x - b.x;
      const dy = a.y - b.y;
      const dz = a.z - b.z;
      return Math.sqrt(dx * dx + dy * dy + dz * dz);
    }

    function clearGroup(group) {
      while (group.children.length) {
        const child = group.children.pop();
        child.geometry?.dispose();
        if (Array.isArray(child.material)) child.material.forEach(m => m.dispose());
        else child.material?.dispose();
      }
    }

    function createLineBetween(a, b, color, opacity = 1) {
      const points = [new THREE.Vector3(a.x, a.y, a.z), new THREE.Vector3(b.x, b.y, b.z)];
      const geometry = new THREE.BufferGeometry().setFromPoints(points);
      const material = new THREE.LineBasicMaterial({ color, transparent: opacity < 1, opacity });
      return new THREE.Line(geometry, material);
    }

    function createTubeBetween(a, b, color, radius = 0.012) {
      const start = new THREE.Vector3(a.x, a.y, a.z);
      const end = new THREE.Vector3(b.x, b.y, b.z);
      const direction = new THREE.Vector3().subVectors(end, start);
      const length = direction.length();
      if (length === 0) return new THREE.Group();

      const geometry = new THREE.CylinderGeometry(radius, radius, length, 16);
      const material = new THREE.MeshBasicMaterial({ color, depthTest: false });
      const cylinder = new THREE.Mesh(geometry, material);

      const midpoint = new THREE.Vector3().addVectors(start, end).multiplyScalar(0.5);
      cylinder.position.copy(midpoint);
      cylinder.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), direction.clone().normalize());
      return cylinder;
    }

    function buildEdges(radius) {
      const threshold = 2 * radius;
      const edges = [];
      const adjacency = Array.from({ length: normalizedPoints.length }, () => []);

      for (let i = 0; i < normalizedPoints.length; i++) {
        for (let j = i + 1; j < normalizedPoints.length; j++) {
          if (distance(normalizedPoints[i], normalizedPoints[j]) <= threshold) {
            edges.push([i, j]);
            adjacency[i].push(j);
            adjacency[j].push(i);
          }
        }
      }
      return { edges, adjacency };
    }

    function findCycle(edges, adjacency) {
      let fallback = [];

      for (const [u, v] of edges) {
        const path = shortestPathExcludingEdge(u, v, u, v, adjacency);
        if (path.length >= 4) return path;
        if (!fallback.length && path.length >= 3) fallback = path;
      }

      return fallback;
    }

    function shortestPathExcludingEdge(start, goal, exA, exB, adjacency) {
      const queue = [start];
      const visited = new Set([start]);
      const parent = new Map();

      while (queue.length) {
        const u = queue.shift();
        if (u === goal) {
          const path = [];
          let cur = goal;
          while (cur !== undefined) {
            path.push(cur);
            cur = parent.get(cur);
          }
          return path.reverse();
        }

        for (const v of adjacency[u]) {
          const isExcluded = (u === exA && v === exB) || (u === exB && v === exA);
          if (isExcluded || visited.has(v)) continue;
          visited.add(v);
          parent.set(v, u);
          queue.push(v);
        }
      }

      return [];
    }

    function drawEdgesAndCycle(radius) {
      clearGroup(edgeGroup);
      clearGroup(cycleGroup);
      if (radius <= 0 || normalizedPoints.length < 3) return;

      const { edges, adjacency } = buildEdges(radius);
      const cycle = findCycle(edges, adjacency);
      const cyclePairs = new Set();

      if (cycle.length >= 3) {
        for (let i = 0; i < cycle.length; i++) {
          const a = cycle[i];
          const b = cycle[(i + 1) % cycle.length];
          cyclePairs.add(edgeKey(a, b));
        }
      }

      const maxGrayEdges = 800;
      for (let k = 0; k < Math.min(edges.length, maxGrayEdges); k++) {
        const [i, j] = edges[k];
        if (cyclePairs.has(edgeKey(i, j))) continue;
        edgeGroup.add(createLineBetween(normalizedPoints[i], normalizedPoints[j], 0x9ca3af, 0.22));
      }

      if (cycle.length >= 3) {
        for (let i = 0; i < cycle.length; i++) {
          const a = cycle[i];
          const b = cycle[(i + 1) % cycle.length];
          cycleGroup.add(createTubeBetween(normalizedPoints[a], normalizedPoints[b], 0xef4444, 0.018));
        }
      }
    }

    function edgeKey(a, b) {
      return a < b ? `${a}-${b}` : `${b}-${a}`;
    }

    function renderPointCloud() {
      clearGroup(pointGroup);
      clearGroup(sphereGroup);
      clearGroup(edgeGroup);
      clearGroup(cycleGroup);

      const radius = Number(els.radius.value);
      const pointColor = new THREE.Color(els.pointColor.value);
      const sphereColor = new THREE.Color(els.sphereColor.value);
      const opacity = Number(els.opacity.value);

      els.radiusValue.textContent = radius.toFixed(3);
      els.opacityValue.textContent = opacity.toFixed(2);

      const pointGeom = new THREE.SphereGeometry(0.025, 16, 16);
      const sphereGeom = new THREE.SphereGeometry(Math.max(radius, 0.0001), 32, 16);

      for (const p of normalizedPoints) {
        const point = new THREE.Mesh(pointGeom, new THREE.MeshStandardMaterial({ color: pointColor, roughness: 0.45 }));
        point.position.set(p.x, p.y, p.z);
        pointGroup.add(point);

        const sphere = new THREE.Mesh(
          sphereGeom,
          new THREE.MeshStandardMaterial({ color: sphereColor, transparent: true, opacity, roughness: 0.4, depthWrite: false })
        );
        sphere.position.set(p.x, p.y, p.z);
        sphereGroup.add(sphere);
      }

      drawEdgesAndCycle(radius);
    }

    function resetCamera() {
      camera.position.set(2.6, 2.1, 2.8);
      controls.target.set(0, 0, 0);
      controls.update();
    }

    function generateAndDraw() {
      try {
        const n = validateCount();
        rawPoints = generatePoints(n);
        normalizedPoints = normalize(rawPoints);
        renderPointCloud();
        resetCamera();
      } catch (e) {
        alert(e.message);
      }
    }

    function runSelfTests() {
      console.assert(generatePoints(3).length === 3, "generatePoints should create requested number of points");
      console.assert(normalize([{ x: 2, y: 0, z: -4 }])[0].z === -1, "normalize should divide by max absolute coordinate");
      console.assert(!document.getElementById("csvFile"), "CSV loading UI should not exist");
      console.assert(!document.getElementById("downloadCsv"), "CSV download button should not exist");
      console.assert(!document.getElementById("stats"), "Information panel should not exist");
      const testEdges = [[0, 1], [1, 2], [2, 0]];
      const testAdj = [[1, 2], [0, 2], [0, 1]];
      console.assert(findCycle(testEdges, testAdj).length >= 3, "findCycle should detect a triangle cycle");
    }

    els.generateSample.addEventListener("click", generateAndDraw);
    [els.radius, els.pointColor, els.sphereColor, els.opacity].forEach(el => el.addEventListener("input", renderPointCloud));

    function resize() {
      const w = viewer.clientWidth;
      const h = viewer.clientHeight;
      if (w <= 0 || h <= 0) return;
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
      renderer.setSize(w, h);
    }
    window.addEventListener("resize", resize);
    resize();

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }

    runSelfTests();
    animate();
    generateAndDraw();
  </script>
</body>
</html>
